name: Setup Python dependencies
description: >
  Cache pip and install requirements-dev.txt (which includes requirements.txt).
  Cache keys use Python major.minor and hashes of requirements files.
runs:
  using: composite
  steps:
    - name: Determine Python version
      id: python-version
      shell: bash
      run: |
        echo "version=$(python -c 'import sys; print("{}.{}".format(sys.version_info.major, sys.version_info.minor))')" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}-v2
        restore-keys: |
          ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
